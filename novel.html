<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter List</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 30px 20px; text-align: center; }
        .back-btn { display: inline-block; background: #334155; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; margin-bottom: 20px; font-weight: bold;}
        .back-btn:hover { background: #475569; }
        select { padding: 15px; font-size: 16px; border-radius: 10px; border: 2px solid #334155; width: 100%; max-width: 400px; background: #1e293b; color: white; margin-top: 20px; outline: none; appearance: none; text-align: center;}
        h2 { color: #10b981; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅️ စာကြည့်တိုက်သို့ ပြန်သွားမည်</a>
    <h2 id="novel-name">Loading Chapters... ⏳</h2>

    <select id="chapter-select" onchange="goToChapter()">
        <option value="">အခန်းများကို ဆွဲယူနေပါသည်... ⏳</option>
    </select>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // id ဖြင့်ဖြစ်စေ၊ novel ဖြင့်ဖြစ်စေ နှစ်မျိုးလုံး လက်ခံနိုင်အောင် ပြင်ပေးထားပါသည်
        const targetNovelId = urlParams.get('id') || urlParams.get('novel'); 

        // နာမည်လေး လှအောင် ပြောင်းပေးခြင်း
        const novelNames = {
            "longevity": "Longevity by Picking up Attributes",
            "summoning-millions-of-gods-daily": "Summoning Millions of Gods Daily" // 👈 Spider ထဲက ID အမှန်နဲ့ ချိတ်ပေးလိုက်ပါပြီ
        };

        document.getElementById('novel-name').innerText = (novelNames[targetNovelId] || (targetNovelId ? targetNovelId.toUpperCase() : "Unknown")) + " (မာတိကာ)";

        async function fetchChapters() {
            try {
                // 🚀 ဤနေရာတွင် Groq လိပ်စာသစ်ကို အစားထိုးထားပါသည်
                const response = await fetch(`https://novel-api-server.onrender.com/api/chapters/${targetNovelId}`);
                const chapters = await response.json();
                const selectEl = document.getElementById('chapter-select');

                if(chapters.length === 0) {
                    selectEl.innerHTML = '<option value="">အခန်းများ မရှိသေးပါ။</option>';
                    return;
                }

                selectEl.innerHTML = '<option value="">📖 ဖတ်လိုသော အခန်းကို ရွေးချယ်ပါ ▼</option>';
                
                // 🧹 အခန်းများ ထပ်နေပါက တစ်ခုတည်းသာ ယူရန် (Set) ကို အသုံးပြုခြင်း
                const seenChapters = new Set(); 

                chapters.reverse().forEach(ch => {
                    if (!seenChapters.has(ch.chapter_id)) { // မပါသေးရင်သာ ထည့်မည်
                        seenChapters.add(ch.chapter_id);
                        const option = document.createElement('option');
                        option.value = ch.chapter_id;
                        option.innerText = `အခန်း ( ${ch.chapter_id} )`;
                        selectEl.appendChild(option);
                    }
                });
            } catch (error) {
                document.getElementById('chapter-select').innerHTML = '<option value="">🔴 ဆာဗာ ချိတ်ဆက်မှု ကျရှုံးပါသည်!</option>';
            }
        }

        function goToChapter() {
            const selectedChId = document.getElementById('chapter-select').value;
            if(selectedChId) {
                window.location.href = `reader.html?novel=${targetNovelId}&chapter=${selectedChId}`;
            }
        }

        if(targetNovelId) fetchChapters();
    </script>
</body>
</html>
