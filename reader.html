<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Reading Room</title>
    <style>
        /* 🌟 အရောင် သတ်မှတ်ချက်များ (မှောင်/လင်း) */
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #10b981; --border: #334155; }
        body.light-mode { --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --accent: #059669; --border: #e5e7eb; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; line-height: 1.8; transition: all 0.4s ease; }
        
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: all 0.4s ease; }
        
        /* 🎛️ Settings Bar (ခလုတ်များ) */
        .settings-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .ctrl-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px;}
        .ctrl-btn:hover { background: var(--accent); color: white; }
        .font-controls { display: flex; gap: 10px; }

        h1 { color: var(--accent); text-align: center; margin-top: 10px; }
        #content { font-size: 18px; white-space: pre-wrap; margin-top: 20px; transition: font-size 0.3s ease; }

        /* Navigation Buttons */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; gap: 10px;}
        .btn { padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; background: var(--accent); color: white; transition: 0.3s; text-align: center; flex: 1;}
        .btn:hover { background: #059669; }
        .btn-home { background: #334155; }
        .btn-home:hover { background: #475569; }
        body.light-mode .btn-home { background: #9ca3af; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🎛️ စာဖတ်သူအတွက် Settings ခလုတ်များ -->
        <div class="settings-bar">
            <button id="theme-toggle" class="ctrl-btn">☀️ လင်း/မှောင်</button>
            <div class="font-controls">
                <button id="font-decrease" class="ctrl-btn">A -</button>
                <button id="font-increase" class="ctrl-btn">A +</button>
            </div>
        </div>

        <h1 id="title">Loading... ⏳</h1>
        <div id="content">ဆာဗာမှ အခန်းကို ဆွဲယူနေပါသည်...</div>

        <!-- အောက်ခြေ ခလုတ်များ -->
        <div class="nav-buttons" id="nav-area" style="display: none;">
            <a href="#" id="prev-btn" class="btn">⬅️ ယခင်ခန်း</a>
            <a href="#" id="home-btn" class="btn btn-home">🏠 မာတိကာ</a>
            <a href="#" id="next-btn" class="btn">နောက်ခန်း ➡️</a>
        </div>
    </div>

    <script>
        // 🌟 1. Settings မှတ်သားမှု စနစ် (Local Storage)
        let currentFontSize = localStorage.getItem('novel_fontSize') ? parseInt(localStorage.getItem('novel_fontSize')) : 18;
        let isLightMode = localStorage.getItem('novel_theme') === 'light';

        const contentEl = document.getElementById('content');
        const themeBtn = document.getElementById('theme-toggle');

        // အရင်ဆက်တင်များကို အသက်သွင်းခြင်း
        contentEl.style.fontSize = currentFontSize + 'px';
        if (isLightMode) {
            document.body.classList.add('light-mode');
            themeBtn.innerText = "🌙 မှောင်ရန်";
        }

        // Font Size အကြီး/အသေး ပြုလုပ်ခြင်း
        document.getElementById('font-increase').addEventListener('click', () => {
            if (currentFontSize < 35) {
                currentFontSize += 2;
                contentEl.style.fontSize = currentFontSize + 'px';
                localStorage.setItem('novel_fontSize', currentFontSize);
            }
        });

        document.getElementById('font-decrease').addEventListener('click', () => {
            if (currentFontSize > 12) {
                currentFontSize -= 2;
                contentEl.style.fontSize = currentFontSize + 'px';
                localStorage.setItem('novel_fontSize', currentFontSize);
            }
        });

        // ☀️🌙 Theme ပြောင်းခြင်း
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('novel_theme', isLight ? 'light' : 'dark');
            themeBtn.innerText = isLight ? "🌙 မှောင်ရန်" : "☀️ လင်းရန်";
        });


        // 🌟 2. ဆာဗာမှ အခန်းဆွဲယူခြင်း စနစ် (မူလအတိုင်း)
        const urlParams = new URLSearchParams(window.location.search);
        const targetNovelId = urlParams.get('novel');
        const chapterId = parseInt(urlParams.get('chapter'));

        if (!targetNovelId || !chapterId) {
            contentEl.innerHTML = "<span style='color:red;'>🔴 လမ်းကြောင်း မှားယွင်းနေပါသည်။</span>";
        } else {
            document.getElementById('home-btn').href = `novel.html?id=${targetNovelId}`;
            fetchChapter(targetNovelId, chapterId);
        }

        async function fetchChapter(novelId, chId) {
            try {
                const response = await fetch(`https://novel-api-server.onrender.com/api/chapter/${novelId}/${chId}`);
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('title').innerText = data.title;
                    contentEl.innerText = data.content;
                    
                    document.getElementById('nav-area').style.display = "flex";
                    
                    const prevBtn = document.getElementById('prev-btn');
                    if(chId > 1) {
                        prevBtn.href = `reader.html?novel=${novelId}&chapter=${chId - 1}`;
                        prevBtn.style.display = "block";
                    } else {
                        prevBtn.style.display = "none";
                    }

                    document.getElementById('next-btn').href = `reader.html?novel=${novelId}&chapter=${chId + 1}`;
                } else {
                    document.getElementById('title').innerText = "🔴 မရှိသေးပါ";
                    contentEl.innerText = "အခန်း ကုန်သွားပါပြီ။";
                }
            } catch (error) {
                contentEl.innerText = "🔴 Server Error! ဆာဗာ ချိတ်ဆက်မှု ကျရှုံးပါသည်။";
            }
        }
    </script>
</body>
</html>
